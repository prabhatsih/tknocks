<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get A Quote</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <section class="quote-bg py-100">
        <div class="position-relative overflow-hidden">
    <div class="circle-decor circle-1"></div>
    <div class="circle-decor circle-2"></div>

    <div class="container">
        <h1 class="text-center text-white fw-semibold">Request a Quote</h1>
        <p class="lead text-center  text-white">
         Tell us about your requirements and we’ll provide <br> the best solution.
        </p>
      <div class="form-container">
        <form>
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label fw-semibold text-info-emphasis">Your name</label>
              <input type="text" class="form-control" placeholder="John Doe">
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold text-info-emphasis">Email</label>
              <input type="email" class="form-control" placeholder="hello@example.com">
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold text-info-emphasis">Phone Number</label>
              <input type="tel" class="form-control" placeholder="+91 98765 43210">
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold text-info-emphasis">Country</label>
              <select class="form-select">
                <option selected>India</option>
                <option>United States</option>
                <option>United Kingdom</option>
                <option>Canada</option>
                <option>Australia</option>
                <option>Germany</option>
                <option>Other</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold text-info-emphasis">Project Type</label>
              <select class="form-select">
                <option selected>Choose project type...</option>
                <option>Website Development</option>
                <option>Mobile App</option>
                <option>UI/UX Design</option>
                <option>Branding</option>
                <option>E-commerce</option>
                <option>Custom Software</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold text-info-emphasis">Estimate Budget</label>
              <select class="form-select">
                <option selected>Select range...</option>
                <option>₹50,000 – ₹1,00,000</option>
                <option>₹1,00,000 – ₹3,00,000</option>
                <option>₹3,00,000 – ₹7,00,000</option>
                <option>₹7,00,000 – ₹15,00,000</option>
                <option>₹15,00,000+</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold text-info-emphasis">Maximum time for the project</label>
              <input type="text" class="form-control" placeholder="e.g. 2–3 months">
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold text-info-emphasis">Company name</label>
              <input type="text" class="form-control" placeholder="Your company (optional)">
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold text-info-emphasis">Required Skills</label>
              <input type="text" class="form-control" placeholder="React, Node.js, UI/UX, Figma, etc.">
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold text-info-emphasis">Upload file</label>
              <div class="upload-area text-center rounded-3">
                <p class="mb-2">Drag file here or click the button below</p>
                <button type="button" class="btn btn-outline-primary btn-sm px-4">
                  Upload File
                </button>
                <input type="file" class="d-none" id="fileInput">
              </div>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold text-info-emphasis">Message</label>
              <textarea class="form-control rounded-3" rows="5" placeholder="Tell us more about your project..."></textarea>
            </div>

          </div>

          <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary btn-lg px-5 fw-semibold">
              Request a Quote
            </button>
          </div>

        </form>

      </div>
    </div>
  </div>
    </section>
    <!-- footer -->
     
    

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/script.js"></script>
</body>
</html>
